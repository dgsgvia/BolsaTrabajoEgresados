<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - UT Empleo</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    UT Empleo
                </a>
                <ul class="navbar-nav">
                    <li><a href="/">Inicio</a></li>
                    <li><a href="/vacantes.html">Vacantes</a></li>
                </ul>
            </div>
        </nav>

        <main class="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <h2>Iniciar Sesion</h2>
                    <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>

                    <div id="alertContainer"></div>

                    <div class="auth-tabs">
                        <button class="auth-tab active" data-tipo="usuario" onclick="cambiarTipoLogin(this)">Egresado</button>
                        <button class="auth-tab" data-tipo="empresa" onclick="cambiarTipoLogin(this)">Empresa</button>
                    </div>

                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <input type="hidden" id="tipoLogin" value="usuario">
                        <div class="form-group">
                            <label for="email">Correo electronico</label>
                            <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contrasena</label>
                            <input type="password" id="password" class="form-control" placeholder="Tu contrasena" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnLogin">Iniciar Sesion</button>
                    </form>

                    <div class="auth-link">
                        <p>No tienes cuenta? <a href="/registro-usuario.html">Registrate como egresado</a></p>
                        <p class="mt-1">Eres empresa? <a href="/registro-empresa.html">Registra tu empresa</a></p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>2025 Bolsa de Trabajo - Universidad Tecnologica.</p>
            </div>
        </footer>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
