<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Egresado - UT Empleo</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    UT Empleo
                </a>
                <ul class="navbar-nav">
                    <li><a href="/">Inicio</a></li>
                    <li><a href="/vacantes.html">Vacantes</a></li>
                    <li><a href="/login.html">Iniciar Sesion</a></li>
                </ul>
            </div>
        </nav>

        <main class="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <h2>Registro de Egresado</h2>
                    <p class="auth-subtitle">Crea tu cuenta para postularte a vacantes</p>

                    <div id="alertContainer"></div>

                    <form id="registroForm" onsubmit="handleRegistroUsuario(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nombre">Nombre *</label>
                                <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required>
                            </div>
                            <div class="form-group">
                                <label for="apellido">Apellido *</label>
                                <input type="text" id="apellido" class="form-control" placeholder="Tu apellido" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Correo electronico *</label>
                            <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contrasena *</label>
                            <input type="password" id="password" class="form-control" placeholder="Minimo 6 caracteres" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="telefono">Telefono</label>
                            <input type="tel" id="telefono" class="form-control" placeholder="555-1234">
                        </div>
                        <div class="form-group">
                            <label for="carrera">Carrera</label>
                            <select id="carrera" class="form-control">
                                <option value="">Selecciona tu carrera</option>
                                <option value="Ingenieria en Sistemas Computacionales">Ingenieria en Sistemas Computacionales</option>
                                <option value="Ingenieria en Software">Ingenieria en Software</option>
                                <option value="Tecnologias de la Informacion">Tecnologias de la Informacion</option>
                                <option value="Ingenieria Industrial">Ingenieria Industrial</option>
                                <option value="Ingenieria en Mecatronica">Ingenieria en Mecatronica</option>
                                <option value="Administracion de Empresas">Administracion de Empresas</option>
                                <option value="Contaduria">Contaduria</option>
                                <option value="Otra">Otra</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnRegistro">Crear Cuenta</button>
                    </form>

                    <div class="auth-link">
                        <p>Ya tienes cuenta? <a href="/login.html">Inicia sesion</a></p>
                        <p class="mt-1">Eres empresa? <a href="/registro-empresa.html">Registra tu empresa</a></p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>2025 Bolsa de Trabajo - Universidad Tecnologica.</p>
            </div>
        </footer>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
