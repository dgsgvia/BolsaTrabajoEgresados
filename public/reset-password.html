<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - UT Empleo</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    UT Empleo
                </a>
                <ul class="navbar-nav">
                    <li><a href="/">Inicio</a></li>
                    <li><a href="/vacantes.html">Vacantes</a></li>
                </ul>
            </div>
        </nav>

        <main class="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <h2>Nueva Contraseña</h2>
                    <p class="auth-subtitle">Ingresa tu nueva contraseña para restablecer el acceso a tu cuenta</p>

                    <div id="alertContainer"></div>

                    <form id="formReset">
                        <div class="form-group">
                            <label for="password">Nueva contraseña</label>
                            <input type="password" id="password" class="form-control" placeholder="Minimo 6 caracteres" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirmar contraseña</label>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Repite tu contraseña" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                            Cambiar contraseña
                        </button>
                    </form>

                    <div class="auth-link">
                        <p>Contraseña actualizada? <a href="/login.html">Iniciar sesion</a></p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>2025 Bolsa de Trabajo - Universidad Tecnologica.</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/reset-password.js"></script>
</body>
</html>
